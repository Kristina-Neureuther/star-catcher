<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Catcher</title>
    <style>
        body {
            background-color: #03060f;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
            touch-action: none; /* Verhindert das Scrollen des Browsers beim Steuern */
        }
        .ui-container {
            position: absolute;
            top: 2%;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            padding: 0 10px;
            box-sizing: border-box;
        }
        h1 { 
            margin: 0; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.3em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #526280; 
            margin: 4px 0 0 0; 
            font-size: 0.75em; 
            text-align: center; 
            letter-spacing: 0.5px;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Anpassung für größere Bildschirme */
        @media (min-width: 600px) {
            h1 { font-size: 1.8em; }
            p { font-size: 0.85em; }
            .ui-container { top: 4%; }
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <h1>STAR CATCHER</h1>
        <p>Pilot your rocket. Collect all 25 gold stars to win!</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- SPIEL-VARIABLEN ---
        const totalStars = 25;
        let score = 0;
        let gameWon = false;
        
        let mouse = { x: 0, y: 0 };
        const ship = { x: 0, y: 0, vx: 0, vy: 0, angle: 0 };

        let stars = [];
        let particles = [];

        // Canvas an Bildschirmgröße anpassen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Falls das Spiel läuft, Ränder für verbleibende Sterne korrigieren
            for (let s of stars) {
                if (s.x > canvas.width - 30) s.x = canvas.width - 30;
                if (s.y > canvas.height - 30) s.y = canvas.height - 30;
            }
        }

        function generateStars() {
            stars = [];
            for (let i = 0; i < totalStars; i++) {
                stars.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    // Hält die Sterne ein bisschen vom oberen Text fern
                    y: Math.random() * (canvas.height - 120) + 90, 
                    pulse: Math.random() * Math.PI * 2 
                });
            }
        }

        function resetGame() {
            score = 0;
            gameWon = false;
            ship.x = canvas.width / 2;
            ship.y = canvas.height / 2;
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = 0;
            particles = [];
            generateStars();
        }

        // Initiale Einrichtung
        resizeCanvas();
        resetGame();

        function updateMouse(e) {
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            mouse.x = clientX;
            mouse.y = clientY;
        }
        
        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', function(e) {
            updateMouse(e);
            e.preventDefault(); // Verhindert Ruckeln auf Handys
        }, { passive: false });

        function handleRestart() {
            if (gameWon) {
                resetGame();
            }
        }
        window.addEventListener('click', handleRestart);
        window.addEventListener('touchstart', handleRestart);
        window.addEventListener('resize', resizeCanvas);

        function createExplosion(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1.0, 
                    hue: 45 
                });
            }
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function update() {
            if (gameWon) return; 

            // 1. Rakete bewegen
            let dx = mouse.x - ship.x;
            let dy = mouse.y - ship.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 0) {
                ship.angle = Math.atan2(dy, dx) + Math.PI / 2; 
            }

            if (distance > 5) {
                ship.vx += (dx / distance) * 0.18;
                ship.vy += (dy / distance) * 0.18;
            }

            let currentSpeed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
            let maxSpeed = canvas.width > 600 ? 3.8 : 2.8; // Auf dem Handy etwas gedrosselt für bessere Kontrolle
            if (currentSpeed > maxSpeed) {
                ship.vx = (ship.vx / currentSpeed) * maxSpeed;
                ship.vy = (ship.vy / currentSpeed) * maxSpeed;
            }

            ship.vx *= 0.91;
            ship.vy *= 0.91;

            ship.x += ship.vx;
            ship.y += ship.vy;

            // Ränder absichern
            if (ship.x < 15) { ship.x = 15; ship.vx *= -0.5; }
            if (ship.x > canvas.width - 15) { ship.x = canvas.width - 15; ship.vx *= -0.5; }
            if (ship.y < 15) { ship.y = 15; ship.vy *= -0.5; }
            if (ship.y > canvas.height - 15) { ship.y = canvas.height - 15; ship.vy *= -0.5; }

            // 2. Sterne updaten
            let collectRadius = canvas.width > 600 ? 25 : 32; // Größerer Einsammelbereich auf dem Handy
            for (let i = stars.length - 1; i >= 0; i--) {
                let s = stars[i];
                s.pulse += 0.05;

                let distToStar = Math.sqrt((ship.x - s.x) ** 2 + (ship.y - s.y) ** 2);
                if (distToStar < collectRadius) {
                    score++;
                    createExplosion(s.x, s.y);
                    stars.splice(i, 1); 
                }
            }

            if (stars.length === 0) {
                gameWon = true;
            }

            // 3. Partikel updaten
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.035; 
                if (p.life <= 0) {
                    particles.splice(i, 1); 
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#02040a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
                ctx.fill();
            }

            for (let s of stars) {
                let sizeBounce = Math.sin(s.pulse) * 1.5;
                let baseRadius = canvas.width > 600 ? 10 : 8; // Sterne minimal kleiner auf kleinen Handys
                
                drawStar(s.x, s.y, 5, baseRadius + sizeBounce, (baseRadius / 2) + sizeBounce / 2);
                
                ctx.fillStyle = 'hsl(45, 100%, 60%)';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'hsl(45, 100%, 50%)';
                ctx.fill();
                ctx.shadowBlur = 0; 
            }

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            if (!gameWon) {
                let speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
                if (speed > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(-4, 8);
                    ctx.lineTo(0, 12 + Math.random() * 8 * (speed/3)); 
                    ctx.lineTo(4, 8);
                    ctx.fillStyle = '#ff7b00';
                    ctx.fill();
                }
            }

            // Schiffsgröße leicht an Bildschirm angepasst
            let shipSize = canvas.width > 600 ? 15 : 12;
            ctx.beginPath();
            ctx.moveTo(0, -shipSize);
            ctx.lineTo(shipSize * 0.7, shipSize);
            ctx.lineTo(-shipSize * 0.7, shipSize);
            ctx.closePath();
            ctx.fillStyle = '#f3f4f6';
            ctx.fill();
            ctx.restore();

            // Score-Anzeige
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = canvas.width > 600 ? '20px sans-serif' : '15px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`SCORE: ${score} / ${totalStars}`, canvas.width / 2, canvas.height - 30);

            if (gameWon) {
                ctx.fillStyle = 'rgba(2, 4, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ffe066';
                ctx.font = canvas.width > 600 ? 'bold 40px sans-serif' : 'bold 26px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('YOU ROCKED IT! 🚀', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#f3f4f6';
                ctx.font = canvas.width > 600 ? '16px sans-serif' : '13px sans-serif';
                ctx.fillText('You collected all the stars. Great job!', canvas.width / 2, canvas.height / 2 + 20);

                ctx.fillStyle = '#526280';
                ctx.font = '13px sans-serif';
                ctx.fillText('Click or tap anywhere to replay', canvas.width / 2, canvas.height / 2 + 65);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
