<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Catcher</title>
    <style>
        body {
            background-color: #03060f;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; 
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #526280; 
            margin-bottom: 20px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 600px;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #02040a;
            cursor: crosshair; 
        }
    </style>
</head>
<body>

    <h1>STAR CATCHER</h1>
    <p>Pilot your rocket using the mouse. Collect all 25 gold stars to win the game!</p>
    
    <canvas id="gameCanvas" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- SPIEL-VARIABLEN ---
        const totalStars = 25;
        let score = 0;
        let gameWon = false;
        
        const mouse = { x: canvas.width / 2, y: canvas.height / 2 };

        const ship = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: 0,
            vy: 0,
            angle: 0
        };

        let stars = [];
        let particles = [];

        // Funktion zum (Neu-)Generieren der Sterne
        function generateStars() {
            stars = [];
            for (let i = 0; i < totalStars; i++) {
                stars.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    y: Math.random() * (canvas.height - 60) + 30,
                    pulse: Math.random() * Math.PI * 2 
                });
            }
        }

        // Das Spiel komplett zurücksetzen
        function resetGame() {
            score = 0;
            gameWon = false;
            ship.x = canvas.width / 2;
            ship.y = canvas.height / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = 0;
            particles = [];
            generateStars();
        }

        // Sterne initial generieren beim ersten Laden
        generateStars();

        function updateMouse(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            mouse.x = clientX - rect.left;
            mouse.y = clientY - rect.top;
        }
        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse);

        // Klick-Event für den Neustart abfangen
        function handleRestart() {
            if (gameWon) {
                resetGame();
            }
        }
        window.addEventListener('click', handleRestart);
        window.addEventListener('touchstart', handleRestart);

        function createExplosion(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1.0, 
                    hue: 45 
                });
            }
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function update() {
            if (gameWon) return; 

            // 1. Rakete bewegen
            let dx = mouse.x - ship.x;
            let dy = mouse.y - ship.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 0) {
                ship.angle = Math.atan2(dy, dx) + Math.PI / 2; 
            }

            if (distance > 5) {
                ship.vx += (dx / distance) * 0.15;
                ship.vy += (dy / distance) * 0.15;
            }

            let currentSpeed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
            if (currentSpeed > 3.5) {
                ship.vx = (ship.vx / currentSpeed) * 3.5;
                ship.vy = (ship.vy / currentSpeed) * 3.5;
            }

            ship.vx *= 0.92;
            ship.vy *= 0.92;

            ship.x += ship.vx;
            ship.y += ship.vy;

            // Ränder
            if (ship.x < 15) { ship.x = 15; ship.vx *= -0.5; }
            if (ship.x > canvas.width - 15) { ship.x = canvas.width - 15; ship.vx *= -0.5; }
            if (ship.y < 15) { ship.y = 15; ship.vy *= -0.5; }
            if (ship.y > canvas.height - 15) { ship.y = canvas.height - 15; ship.vy *= -0.5; }

            // 2. Sterne updaten
            for (let i = stars.length - 1; i >= 0; i--) {
                let s = stars[i];
                s.pulse += 0.05;

                let distToStar = Math.sqrt((ship.x - s.x) ** 2 + (ship.y - s.y) ** 2);
                if (distToStar < 25) {
                    score++;
                    createExplosion(s.x, s.y);
                    stars.splice(i, 1); 
                }
            }

            if (stars.length === 0) {
                gameWon = true;
            }

            // 3. Partikel updaten
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03; 
                if (p.life <= 0) {
                    particles.splice(i, 1); 
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#02040a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
                ctx.fill();
            }

            for (let s of stars) {
                let sizeBounce = Math.sin(s.pulse) * 1.5;
                
                drawStar(s.x, s.y, 5, 10 + sizeBounce, 4 + sizeBounce / 2);
                
                ctx.fillStyle = 'hsl(45, 100%, 60%)';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'hsl(45, 100%, 50%)';
                ctx.fill();
                ctx.shadowBlur = 0; 
            }

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            if (!gameWon) {
                let speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
                if (speed > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(-5, 10);
                    ctx.lineTo(0, 15 + Math.random() * 10 * (speed/3)); 
                    ctx.lineTo(5, 10);
                    ctx.fillStyle = '#ff7b00';
                    ctx.fill();
                }
            }

            ctx.beginPath();
            ctx.moveTo(0, -15);
            ctx.lineTo(10, 10);
            ctx.lineTo(-10, 10);
            ctx.closePath();
            ctx.fillStyle = '#f3f4f6';
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.font = '20px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score} / ${totalStars}`, 20, 40);

            if (gameWon) {
                ctx.fillStyle = 'rgba(2, 4, 10, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ffe066';
                ctx.font = 'bold 44px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('YOU ROCKED IT! 🚀', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#f3f4f6';
                ctx.font = '16px "Segoe UI", sans-serif';
                ctx.fillText('You collected all the stars. Great job!', canvas.width / 2, canvas.height / 2 + 25);

                // Neuer, blinkender Hinweis für den Neustart
                ctx.fillStyle = '#526280';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.fillText('Click or tap anywhere to replay', canvas.width / 2, canvas.height / 2 + 70);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
